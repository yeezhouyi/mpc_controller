# ros2_control Diff-Drive MPC controller configuration.
#
# Kinematic unicycle model:
#   x_{k+1} = x_k + dt * v_k * cos(theta_k)
#   y_{k+1} = y_k + dt * v_k * sin(theta_k)
#   theta_{k+1} = theta_k + dt * omega_k
#
# Linearised about current operating point for MPC.
# For MVP we use a simple 2-state velocity model:
#   x = [v, omega]    (2 states)
#   u = [v_cmd, omega_cmd]  (2 inputs)
#
# First-order lag:
#   v_{k+1} = v_k + dt * (u_v - v_k) / tau
#
# Simplified with tau = 0.1:
#   v_{k+1} = 0.9 * v_k + 0.1 * u_v
#   omega_{k+1} = 0.9 * omega_k + 0.1 * u_omega
controller_manager:
  ros__parameters:
    update_rate: 100

mpc_controller:
  ros__parameters:
    prediction_horizon: 20
    dt: 0.01

    state_dim: 2
    input_dim: 2

    # First-order lag model
    A_data: [
      0.9, 0.0,
      0.0, 0.9
    ]
    B_data: [
      0.1, 0.0,
      0.0, 0.1
    ]

    # Cost weights
    Q_diag: [10.0, 10.0]
    R_diag: [1.0, 1.0]
    S_diag: [5.0, 5.0]

    # State bounds (linear/angular velocity)
    state_lower: [-1.0, -2.0]
    state_upper: [ 1.0,  2.0]

    # Input bounds
    input_lower: [-1.0, -2.0]
    input_upper: [ 1.0,  2.0]

    # Input rate bounds
    input_rate_lower: [-4.0, -6.0]
    input_rate_upper: [ 4.0,  6.0]

    # Interface mapping
    state_interface_names: [
      "velocity/linear",
      "velocity/angular"
    ]
    command_interface_names: [
      "velocity/linear",
      "velocity/angular"
    ]
